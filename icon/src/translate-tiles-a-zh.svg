<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">BarTranslateACO app icon</title>
  <desc id="desc">Two overlapping translation tiles with a Chinese character on the rear tile and the letter A on the front tile.</desc>
  <defs>
    <linearGradient id="background" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e5e7eb"/>
    </linearGradient>
    <linearGradient id="rear" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="front" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#0f172a" flood-opacity="0.20"/>
    </filter>
  </defs>
  <rect x="24" y="24" width="976" height="976" rx="220" fill="url(#background)"/>
  <g filter="url(#shadow)">
    <rect x="202" y="240" width="416" height="416" rx="92" fill="url(#rear)"/>
    <text x="410" y="505" text-anchor="middle" font-family="PingFang SC, Hiragino Sans GB, Noto Sans CJK SC, sans-serif" font-size="235" font-weight="800" fill="#ffffff">文</text>
    <rect x="412" y="388" width="416" height="416" rx="92" fill="url(#front)"/>
    <text x="620" y="678" text-anchor="middle" font-family="Avenir Next, SF Pro Display, Helvetica Neue, sans-serif" font-size="300" font-weight="900" fill="#082f49">A</text>
  </g>
</svg>
